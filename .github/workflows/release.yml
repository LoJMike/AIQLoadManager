name: Build & Release

# ─────────────────────────────────────────────────────────────────────────────
# Triggers when you push a version tag, e.g.:
#   git tag v0.4.1
#   git push origin v0.4.1
#
# What happens:
#   1. build-windows  → runs on GitHub's Windows runner, produces an .exe
#   2. build-mac      → runs on GitHub's Mac runner, produces a .dmg
#   3. create-release → waits for both, then publishes a GitHub Release with
#                       both installers attached as downloadable files
#
# ⚠ CODE SIGNING (read before your first public release)
#   Without signing certificates, users will see security warnings:
#     • Windows: SmartScreen "Unknown publisher" — click "More info → Run anyway"
#     • Mac:     Gatekeeper blocks the app — right-click → Open to bypass
#   This is fine for beta/early-access. When you're ready for proper signing,
#   ask Claude to add the signing steps — it requires purchasing certificates.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'          # matches v0.4.1, v1.0.0, v2.3.0-beta, etc.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # keeps parity with ci.yml

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Windows installer (.exe)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npx --no-install vite build
        env:
          NODE_ENV: production

      - name: Package Windows installer
        # --publish never stops electron-builder from trying to upload to GitHub
        # (we handle the release ourselves in the create-release job)
        run: npx --no-install electron-builder --win --publish never
        env:
          NODE_ENV: production

      - name: Upload Windows installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-app/*.exe
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Mac installer (.dmg)
# ─────────────────────────────────────────────────────────────────────────────
  build-mac:
    name: Build Mac installer
    runs-on: macos-latest    # macOS 14, Apple Silicon — builds both arm64 + x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npx --no-install vite build
        env:
          NODE_ENV: production

      - name: Package Mac installer
        # CSC_IDENTITY_AUTO_DISCOVERY=false skips code-signing (no cert needed for beta)
        # --publish never stops electron-builder from trying to upload to GitHub
        run: npx --no-install electron-builder --mac --publish never
        env:
          NODE_ENV: production
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: dist-app/*.dmg
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Create GitHub Release
# Waits for both builds to succeed, then publishes the release with both
# installer files attached.
# ─────────────────────────────────────────────────────────────────────────────
  create-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-mac]   # only runs if both builds pass

    permissions:
      contents: write    # required to create releases and upload assets

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets

      - name: Download Mac installer
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: release-assets

      - name: List files to be released
        run: ls -lh release-assets/

      - name: Create GitHub Release and attach installers
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true    # auto-generates changelog from commits
          draft: false                    # publishes immediately; set true to review first
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Tags like v1.0.0-beta or v1.0.0-rc.1 are automatically marked pre-release
          # Tags like v1.0.0 are marked as full releases
